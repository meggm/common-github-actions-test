# This WorkFlow is used to trigger the release of csm repos using one-click action

name: Get Latest Release Version
on:
  workflow_dispatch:
    inputs:
      repository:
        description: "meggm/test-gofsutil-release"
        required: true

jobs:
  get-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Release Version
        id: get_release
        run: |
          REPO="${{ github.event.inputs.repository }}"
          echo "Fetching latest release for $REPO"
          
          # Fetch the latest release version using GitHub API
          RELEASE_VERSION=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | jq -r '.tag_name')
          
          # If no release found, handle gracefully
          if [[ "$RELEASE_VERSION" == "null" ]]; then
            echo "No release found for $REPO"
            RELEASE_VERSION="No release found"
          fi

          echo "Latest release version: $RELEASE_VERSION"
          
          # Set as an output
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Print Latest Release Version
        run: |
          echo "The latest release version is: ${{ steps.get_release.outputs.release_version }}"
