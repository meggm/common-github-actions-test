name: Versioning Workflow

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
      image:
        required: true
        type: string

jobs:
  versioning:
    runs-on: ubuntu-latest
    steps:
      - name: Show version and image
        run: |
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Image: ${{ inputs.image }}"
