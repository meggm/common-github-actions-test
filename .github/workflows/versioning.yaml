name: Versioning Workflow

on:
  workflow_call:
  workflow_dispatch:

jobs:
  get-latest-release:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.get_release.outputs.release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Get Latest Release Version
        id: get_release
        run: |
          REPO="${{ github.repository }}"
          echo "Fetching latest release for $REPO"
          RELEASE_VERSION=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | jq -r '.tag_name' | sed 's/^v//')
          if [[ "$RELEASE_VERSION" == "null" ]]; then
            echo "No release found for $REPO"
            RELEASE_VERSION="0.0.0"
          fi
          echo "Latest release version: $RELEASE_VERSION"
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  calculate-next-version:
    needs: get-latest-release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.calculate_version.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Calculate Next Minor Version
        id: calculate_version
        run: |
          RELEASE_VERSION="${{ needs.get-latest-release.outputs.release_version }}"
          VERSION="$RELEASE_VERSION"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEXT_MINOR.0"
          echo "Next version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  extract-image-name:
    needs: calculate-next-version
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.extract_image.outputs.image_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Extract Image Name
        id: extract_image
        run: |
          REPO="${{ github.repository }}"
          IMAGE_NAME=$(echo "$REPO" | awk -F'/' '{print $2}')
          echo "Image name: $IMAGE_NAME"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

  trigger-secondary-workflow:
    needs: extract-image-name
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Secondary Workflow
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: meggm/common-github-actions-test/.github/workflows/csm-release-driver-module.yaml@main
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: |
            version: ${{ needs.calculate-next-version.outputs.new_version }}
            image: ${{ needs.extract-image-name.outputs.image_name }}          

