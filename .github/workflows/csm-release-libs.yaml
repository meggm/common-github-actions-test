name: Release Go Client Libraries

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (major, minor, patch), ex: 1.0.0'
        required: false

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Determine version
        id: determine_version
        run: |
          if [ "${{ github.event.inputs.version }}" != "none" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            REPO="${{ github.repository }}"
            echo "Fetching latest release for $REPO"
            RELEASE_VERSION=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | jq -r '.tag_name')
            if [[ "$RELEASE_VERSION" == "null" ]]; then
              echo "No release found for $REPO"
              RELEASE_VERSION="v0.0.0"
            fi
            echo "Latest release version: $RELEASE_VERSION"
            VERSION="${RELEASE_VERSION#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEXT_MINOR=$((MINOR + 1))
            NEW_VERSION="v$MAJOR.$NEXT_MINOR.0"
            VERSION=$NEW_VERSION
          fi
          echo "Determined version: $VERSION"
          echo "::set-output name=version::$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output Version
        run: echo "Determined version:${{ steps.determine_version.outputs.version }}"

