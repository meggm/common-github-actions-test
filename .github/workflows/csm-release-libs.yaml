# This workflow is used to release libraries like gobrick, gofsutil etc.
name: Release Go Client Libraries

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to release (major.minor.patch), e.g., 1.0.0'
        required: false # Optional since we calculate it in the workflow

jobs:
  compute-version:
    runs-on: ubuntu-latest

    outputs:
      next_version: ${{ steps.increment_version.outputs.next_version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Get Current Version (Latest Tag)
        id: determine_version
        run: |
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "Current version: $CURRENT_VERSION"

      - name: Validate Current Version
        id: validate_version
        run: |
          if [[ ! "${{ env.CURRENT_VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "No valid semantic version tag found. Defaulting to 0.0.0"
            echo "CURRENT_VERSION=0.0.0" >> $GITHUB_ENV
          fi

      - name: Increment Minor Version
        id: increment_version
        run: |
          IFS='.' read -r -a VERSION_PARTS <<< "${{ env.CURRENT_VERSION }}"
          MAJOR_VERSION=${VERSION_PARTS[0]}
          MINOR_VERSION=${VERSION_PARTS[1]}
          PATCH_VERSION=${VERSION_PARTS[2]}
          NEW_MINOR_VERSION=$((MINOR_VERSION + 1))
          NEXT_VERSION="${MAJOR_VERSION}.${NEW_MINOR_VERSION}.0"
          echo "Next version: $NEXT_VERSION"
          echo "::set-output name=next_version::$NEXT_VERSION"

  build-and-release:
    needs: compute-version
    runs-on: ubuntu-latest

    steps:
      - name: Validate Version
        run: |
          echo "Releasing version: ${{ needs.compute-version.outputs.next_version }}"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Code
        run: go build -v ./...

      - name: Create New Tag
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git tag v${{ needs.compute-version.outputs.next_version }}
          git push origin v${{ needs.compute-version.outputs.next_version }}

      - name: Create Release
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.next_version }}
          name: Release v${{ needs.compute-version.outputs.next_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Branch
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git checkout -b release/v${{ needs.compute-version.outputs.next_version }}
          git push origin release/v${{ needs.compute-version.outputs.next_version }}

