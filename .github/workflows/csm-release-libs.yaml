name: Release Go Client Libraries

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (major, minor, patch), ex: 1.0.0'
        required: false
        default: 'none'

jobs:
  build-and-scan:
    name: Build, Scan and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run malware scan
        uses: dell/common-github-actions/malware-scanner@main
        with:
          directories: .
          options: -ri

      - name: Determine version
        id: determine_version
        run: |
          if [ "${{ github.event.inputs.version }}" != "none" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            REPO="${{ github.repository }}"
            echo "Fetching latest release for $REPO"
            RELEASE_VERSION=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | jq -r '.tag_name')
            if [[ "$RELEASE_VERSION" == "null" ]]; then
              echo "No release found for $REPO"
              RELEASE_VERSION="v0.0.0"
            fi
            echo "Latest release version: $RELEASE_VERSION"
            VERSION="${RELEASE_VERSION#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEXT_MINOR=$((MINOR + 1))
            NEW_VERSION="v$MAJOR.$NEXT_MINOR.0"
            VERSION=$NEW_VERSION
          fi
          echo "Determined version: $VERSION"
          echo "::set-output name=version::$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag in remote
        run: |
          git tag -d v${{ steps.determine_version.outputs.version }} || true
          git push --delete origin v${{ steps.determine_version.outputs.version }} || true

      - name: Create new tag
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git tag v${{ steps.determine_version.outputs.version }}
          git push origin v${{ steps.determine_version.outputs.version }}

      - name: Create Release
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.determine_version.outputs.version }}
          name: Release v${{ steps.determine_version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release branch
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git checkout -b release/v${{ steps.determine_version.outputs.version }}
          git push origin release/v${{ steps.determine_version.outputs.version }}

