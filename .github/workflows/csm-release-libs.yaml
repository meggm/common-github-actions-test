name: Release Go Client Libraries

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (major, minor, patch), ex: 1.0.0'
        required: false
        default: 'none'

jobs:
  build-and-scan:
    name: Build, Scan and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run malware scan
        uses: dell/common-github-actions/malware-scanner@main
        with:
          directories: .
          options: -ri

      - name: Determine version
        id: determine_version
        run: |
          if [ "${{ github.event.inputs.version }}" != "none" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            latest_release=$(gh release view --json tagName -q .tagName)
            version_parts=(${latest_release//./ })
            minor_version=$((version_parts[1] + 1))
            new_version="${version_parts[0]}.${minor_version}.0"
            echo "version=${new_version}" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag in remote
        run: |
          git tag -d v${{ env.version }} || true
          git push --delete origin v${{ env.version }} || true

      - name: Create new tag
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git tag v${{ env.version }}
          git push origin v${{ env.version }}

      - name: Create Release
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.version }}
          name: Release v${{ env.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release branch
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git checkout -b release/v${{ env.version }}
          git push origin release/v${{ env.version }}
