name: Release Go Client Libraries

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (major, minor, patch), ex: 1.0.0'
        required: false
        default: 'none'

jobs:
  build-and-scan:
    name: Build, Scan and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run malware scan
        uses: dell/common-github-actions/malware-scanner@main
        with:
          directories: .
          options: -ri

      - name: Determine version
        id: determine_version
        uses: actions/github-script@v6
        with:
          script: |
            let version;
            if ("${{ github.event.inputs.version }}" !== "none") {
              const versionParts = "${{ github.event.inputs.version }}".split('.');
              const minorVersion = parseInt(versionParts[1]) + 1;
              version = `${versionParts[0]}.${minorVersion}.0`;
            } else {
              const latestRelease = await github.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              const tagName = latestRelease.data.tag_name;
              const versionParts = tagName.split('.');
              const minorVersion = parseInt(versionParts[1]) + 1;
              version = `${versionParts[0]}.${minorVersion}.0`;
            }
            core.setOutput('version', version);

      - name: Delete existing tag in remote
        run: |
          git tag -d v${{ steps.determine_version.outputs.version }} || true
          git push --delete origin v${{ steps.determine_version.outputs.version }} || true

      - name: Create new tag
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git tag v${{ steps.determine_version.outputs.version }}
          git push origin v${{ steps.determine_version.outputs.version }}

      - name: Create Release
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.determine_version.outputs.version }}
          name: Release v${{ steps.determine_version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release branch
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git checkout -b release/v${{ steps.determine_version.outputs.version }}
          git push origin release/v${{ steps.determine_version.outputs.version }}

